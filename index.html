<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeKnow Advisory</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0F0F10;
            --gold: #C6A75E;
            --text-muted: #A1A1A6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }

        /* subtle grain */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence baseFrequency='0.65'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.015'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(40px, 7vw, 90px);
            letter-spacing: 0.22em;
            display: flex;
            align-items: center;
            gap: 0.18em;
            color: var(--gold);
        }

        .hero-title span {
            display: inline-block;
            transform: translateY(35px);
            opacity: 0;
            filter: blur(6px);
            animation: reveal 0.8s ease forwards;
        }

        .hero-title span:nth-child(1) { animation-delay: 0.05s; }
        .hero-title span:nth-child(2) { animation-delay: 0.1s; }
        .hero-title span:nth-child(3) { animation-delay: 0.15s; }
        .hero-title span:nth-child(4) { animation-delay: 0.2s; }
        .hero-title span:nth-child(5) { animation-delay: 0.25s; }
        .hero-title span:nth-child(6) { animation-delay: 0.3s; }
        .hero-title span:nth-child(7) { animation-delay: 0.35s; }

        @keyframes reveal {
            to {
                transform: translateY(0);
                opacity: 1;
                filter: blur(0);
            }
        }

        .dot {
            font-size: 0.6em;
            opacity: 0;
            animation: fadeDot 1s ease forwards;
            animation-delay: 0.4s;
        }

        @keyframes fadeDot {
            to { opacity: 1; }
        }

        .underline {
            width: 0;
            height: 2px;
            background: var(--gold);
            margin-top: 22px;
            animation: line 1.2s ease forwards;
            animation-delay: 0.9s;
        }

        @keyframes line {
            to {
                width: 200px;
            }
        }

        .tagline {
            margin-top: 36px;
            font-size: 13px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            text-align: center;
            opacity: 0;
            animation: fade 1s ease forwards;
            animation-delay: 1.4s;
        }

        @keyframes fade {
            to { opacity: 1; }
        }

        .footer {
            position: absolute;
            bottom: 28px;
            font-size: 11px;
            letter-spacing: 0.12em;
            color: #6E6E73;
            text-align: center;
        }

        /* Mobile fine tuning */
        @media (max-width: 600px) {
            .hero-title {
                font-size: 36px;
                letter-spacing: 0.18em;
            }
            .underline {
                animation: lineMobile 1.2s ease forwards;
            }
            @keyframes lineMobile {
                to { width: 140px; }
            }
            .tagline {
                font-size: 11px;
                padding: 0 20px;
            }
        }
    </style>
</head>

<body>

<h1 class="hero-title">
    <span>W</span>
    <span>E</span>
    <span class="dot">·</span>
    <span>K</span>
    <span>N</span>
    <span>O</span>
    <span>W</span>
</h1>

<div class="underline"></div>

<div class="tagline">
    Strategic Advisory. Capital Structuring. Global Mandates.
</div>

<div class="footer">
    WeKnow Advisory Ltd. · Confidential Inquiries Only
</div>

</body>
</html>
